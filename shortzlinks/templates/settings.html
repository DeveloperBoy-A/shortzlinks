{% extends "base.html" %}

{% block title %}Settings - Shortzlinks{% endblock %}

{% block content %}
<div class="settings-container">
    <h1>Settings</h1>

    <section class="settings-card">
        <h2>Account Information</h2>
        <div class="info-row">
            <label>Username</label>
            <p>{{ user.username }}</p>
        </div>
        <div class="info-row">
            <label>Email</label>
            <p>{{ user.email }}</p>
        </div>
        <div class="info-row">
            <label>Referral Code</label>
            <p>{{ user.referral_code }}</p>
        </div>
    </section>

    <section class="settings-card">
        <h2>Branding</h2>
        <form id="settingsForm">
            <div class="form-group">
                <label>Brand Name</label>
                <input type="text" id="brand_name" value="{{ user.brand_name }}" placeholder="Your Brand Name">
            </div>
            <div class="form-group">
                <label>Custom Domain</label>
                <input type="text" id="domain" value="{{ user.domain }}" placeholder="short.yoursite.com">
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </section>

    <div id="successMessage" class="alert alert-success" style="display: none;">
        Settings updated successfully!
    </div>
</div>

<script>
document.getElementById('settingsForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const brand_name = document.getElementById('brand_name').value;
    const domain = document.getElementById('domain').value;
    
    try {
        const response = await fetch('/api/settings/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ brand_name, domain })
        });
        
        if (response.ok) {
            document.getElementById('successMessage').style.display = 'block';
            setTimeout(() => {
                document.getElementById('successMessage').style.display = 'none';
            }, 3000);
        }
    } catch (error) {
        alert('Error updating settings');
    }
});
</script>
{% endblock %}
